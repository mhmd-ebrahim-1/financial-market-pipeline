version: "3"

services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    restart: always
    ports:
      - 9870:9870
      - 9000:9000
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
      - D:/Downloads/big data:/opt/project
    environment:
      - CLUSTER_NAME=test
    env_file:
      - ./hadoop.env
    networks:
      - hadoop_network

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    restart: always
    ports:
      - 9864:9864
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    environment:
      SERVICE_PRECONDITION: "namenode:9870"
    env_file:
      - ./hadoop.env
    networks:
      - hadoop_network

  resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
    container_name: resourcemanager
    restart: always
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode:9864"
    env_file:
      - ./hadoop.env
    networks:
      - hadoop_network

  nodemanager1:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    container_name: nodemanager
    restart: always
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode:9864 resourcemanager:8088"
    env_file:
      - ./hadoop.env
    networks:
      - hadoop_network

  historyserver:
    image: bde2020/hadoop-historyserver:2.0.0-hadoop3.2.1-java8
    container_name: historyserver
    restart: always
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode:9864 resourcemanager:8088"
    volumes:
      - hadoop_historyserver:/hadoop/yarn/timeline
    env_file:
      - ./hadoop.env
    networks:
      - hadoop_network

  spark-master:
    image: apache/spark:latest
    container_name: spark-master
    restart: always
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - D:/Downloads/big data:/opt/project
    networks:
      - hadoop_network

  spark-worker:
    image: apache/spark:latest
    container_name: spark-worker
    restart: always
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    networks:
      - hadoop_network

  postgres:
    image: postgres:13
    container_name: airflow-postgres
    restart: always
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres:/var/lib/postgresql/data
    networks:
      - hadoop_network

  airflow-init:
    image: apache/airflow:2.8.1
    container_name: airflow-init
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: 'change_me_airflow_secret_key'
      _PIP_ADDITIONAL_REQUIREMENTS: "yfinance==0.2.38 pandas pyyaml multitasking==0.0.9 snowflake-connector-python"
      SNOWFLAKE_USER: mhmd1
      SNOWFLAKE_PASSWORD: "zgj1knc@mum.TRB5yzu"
      SNOWFLAKE_ACCOUNT: to38000.eu-central-2.aws
    volumes:
      - D:/Downloads/big data/airflow:/opt/airflow/dags
    command: >
      bash -c "airflow db migrate &&
               airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com --ignore-existing || true"
    networks:
      - hadoop_network

  airflow-webserver:
    image: apache/airflow:2.8.1
    container_name: airflow-webserver
    restart: always
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: 'change_me_airflow_secret_key'
      _PIP_ADDITIONAL_REQUIREMENTS: "yfinance==0.2.38 pandas pyyaml multitasking==0.0.9 snowflake-connector-python"
      SNOWFLAKE_USER: mhmd1
      SNOWFLAKE_PASSWORD: "zgj1knc@mum.TRB5yzu"
      SNOWFLAKE_ACCOUNT: to38000.eu-central-2.aws
    volumes:
      - D:/Downloads/big data/airflow:/opt/airflow/dags
      - D:/Downloads/big data:/opt/project
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8081:8080"
    command: airflow webserver
    networks:
      - hadoop_network

  airflow-scheduler:
    image: apache/airflow:2.8.1
    container_name: airflow-scheduler
    restart: always
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: 'change_me_airflow_secret_key'
      _PIP_ADDITIONAL_REQUIREMENTS: "yfinance==0.2.38 pandas pyyaml multitasking==0.0.9 snowflake-connector-python"
      SNOWFLAKE_USER: mhmd1
      SNOWFLAKE_PASSWORD: "zgj1knc@mum.TRB5yzu"
      SNOWFLAKE_ACCOUNT: to38000.eu-central-2.aws
    volumes:
      - D:/Downloads/big data/airflow:/opt/airflow/dags
      - D:/Downloads/big data:/opt/project
      - /var/run/docker.sock:/var/run/docker.sock
    command: airflow scheduler
    networks:
      - hadoop_network

volumes:
  hadoop_namenode:
  hadoop_datanode:
  hadoop_historyserver:
  airflow_postgres:

networks:
  hadoop_network:
    driver: bridge